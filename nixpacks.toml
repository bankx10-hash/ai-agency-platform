[phases.install]
cmds = ["npm install --workspace=apps/api --include-workspace-root"]

[phases.build]
cmds = ["npx prisma generate --schema=./prisma/schema.prisma", "npm run build --workspace=apps/api"]

[start]
cmd = "npx prisma migrate deploy --schema=./prisma/schema.prisma && node apps/api/dist/apps/api/src/index.js"
