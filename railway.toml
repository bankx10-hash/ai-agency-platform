[build]
buildCommand = "npm install --include-workspace-root && npm run build --workspace=apps/api"

[deploy]
startCommand = "npx prisma migrate deploy --schema=./prisma/schema.prisma && node apps/api/dist/apps/api/src/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
